<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HMS · Dialogue Generator</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#080808;
  color:#d8d8d8;
  font-family:'Helvetica Neue','PingFang TC','Microsoft JhengHei',sans-serif;
  display:flex;
  height:100vh;
  overflow:hidden;
}

/* ═══ LEFT ═══ */
.left {
  width:380px;
  min-width:380px;
  background:#0f0f0f;
  border-right:1px solid #1c1c1c;
  display:flex;
  flex-direction:column;
  height:100vh;
}
.left-header {
  padding:22px 22px 16px;
  border-bottom:1px solid #1a1a1a;
  flex-shrink:0;
}
.brand-label { font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:#444;margin-bottom:4px; }
.tool-title { font-size:16px;font-weight:300;color:#bbb;letter-spacing:0.04em; }

.left-body { flex:1;overflow-y:auto;padding:0 0 8px; }

.sec { padding:14px 22px;border-bottom:1px solid #141414; }
.sec-label { font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:#383838;margin-bottom:9px; }

/* BG upload */
.bg-grid { display:grid;grid-template-columns:1fr 1fr;gap:6px; }
.bg-slot {
  aspect-ratio:9/16;
  border:1px dashed #222;
  border-radius:3px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  cursor:pointer;position:relative;overflow:hidden;
  transition:border-color 0.2s;
}
.bg-slot:hover { border-color:#444; }
.bg-slot input { position:absolute;inset:0;opacity:0;cursor:pointer;z-index:3; }
.bg-slot img { position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:2px;z-index:1; }
.bg-slot-label { font-size:9px;color:#2e2e2e;letter-spacing:0.1em;text-transform:uppercase;z-index:2; }
.bg-slot .slot-num { font-size:16px;color:#222;margin-bottom:3px;z-index:2; }
.bg-slot.filled .bg-slot-label { color:rgba(255,255,255,0.7);text-shadow:0 1px 3px #000; }
.bg-slot .remove-bg {
  position:absolute;top:4px;right:4px;z-index:4;
  background:rgba(0,0,0,0.75);border:none;color:#aaa;
  width:18px;height:18px;border-radius:50%;font-size:11px;
  cursor:pointer;display:none;align-items:center;justify-content:center;
}
.bg-slot.filled .remove-bg { display:flex; }

/* Inputs */
input[type=text], textarea, select {
  width:100%;background:#090909;border:1px solid #1e1e1e;border-radius:2px;
  color:#ccc;font-family:inherit;font-size:13px;padding:8px 10px;outline:none;
  transition:border-color 0.2s;
}
input[type=text]:focus, textarea:focus { border-color:#3a3a3a; }
textarea { resize:vertical;line-height:1.6; }
.gap6 { margin-bottom:6px; }

/* Dialogue textarea */
.dialogue-input { min-height:200px;font-size:12px;line-height:1.7; }
.hint { font-size:10px;color:#333;margin-top:6px;line-height:1.6; }

/* Timing */
.timing-row { display:flex;align-items:center;justify-content:space-between;margin-bottom:8px; }
.timing-row:last-child { margin-bottom:0; }
.timing-label { font-size:11px;color:#4a4a4a; }
.timing-right { display:flex;align-items:center;gap:6px; }
input[type=range] { width:90px;background:none;border:none;padding:0;accent-color:#666;cursor:pointer; }
.timing-val { font-size:10px;color:#3a3a3a;min-width:34px;text-align:right; }

/* Footer */
.left-footer { padding:14px 22px;border-top:1px solid #181818;flex-shrink:0;display:flex;flex-direction:column;gap:7px; }
.gen-btn {
  width:100%;padding:12px;background:#d8d8d8;color:#080808;
  border:none;border-radius:2px;font-size:10px;letter-spacing:0.18em;
  text-transform:uppercase;cursor:pointer;font-family:inherit;font-weight:600;
  transition:background 0.15s;
}
.gen-btn:hover { background:#fff; }
.export-btn {
  width:100%;padding:9px;background:#1a1a1a;border:1px solid #555;border-radius:2px;
  color:#bbb;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;
  cursor:pointer;font-family:inherit;transition:all 0.2s;
}
.export-btn:hover:not(:disabled) { border-color:#aaa;color:#fff;background:#252525; }
.export-btn:disabled { opacity:0.3;cursor:not-allowed; }
.status { font-size:10px;color:#3a3a3a;letter-spacing:0.04em;text-align:center;min-height:13px; }

/* ═══ RIGHT ═══ */
.right {
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:16px;padding:28px;overflow:hidden;
}

.bg-chips { display:flex;gap:6px; }
.bg-chip {
  width:30px;height:48px;border-radius:2px;overflow:hidden;
  cursor:pointer;border:2px solid transparent;transition:border-color 0.15s;
  background:#1a1a1a;display:flex;align-items:center;justify-content:center;
  font-size:9px;color:#2a2a2a;
}
.bg-chip.active { border-color:#888; }
.bg-chip img { width:100%;height:100%;object-fit:cover; }

canvas {
  display:block;border-radius:3px;
  box-shadow:0 8px 60px rgba(0,0,0,0.85);
}

.playback {
  display:flex;align-items:center;gap:10px;
  background:#0f0f0f;border:1px solid #1a1a1a;border-radius:3px;
  padding:8px 14px;width:100%;max-width:300px;
}
.play-pause {
  width:30px;height:30px;background:#d8d8d8;border:none;border-radius:50%;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background 0.15s;
}
.play-pause:hover { background:#fff; }
.play-pause svg { width:11px;height:11px;fill:#080808; }
.track { flex:1;height:2px;background:#1a1a1a;border-radius:1px;cursor:pointer;position:relative; }
.track-fill { height:100%;background:#555;border-radius:1px;pointer-events:none; }
.time { font-size:10px;color:#333;min-width:52px;text-align:right;font-variant-numeric:tabular-nums; }

::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:#080808; }
::-webkit-scrollbar-thumb { background:#1e1e1e;border-radius:2px; }
</style>
</head>
<body>

<!-- LEFT -->
<div class="left">
  <div class="left-header">
    <div class="brand-label">Human Space</div>
    <div class="tool-title">Dialogue Video Generator</div>
  </div>

  <div class="left-body">

    <div class="sec">
      <div class="sec-label">Background Images (up to 4)</div>
      <div class="bg-grid" id="bgGrid"></div>
    </div>

    <div class="sec">
      <div class="sec-label">Fixed Title</div>
      <input type="text" id="titleLine1" placeholder="第一行標題" class="gap6">
      <input type="text" id="titleLine2" placeholder="第二行標題（選填）">
    </div>

    <div class="sec">
      <div class="sec-label">Dialogue Script</div>
      <textarea class="dialogue-input" id="dialogueInput" placeholder="直接貼上整段對話，格式如下：

A：為什麼同一件事，我總是反覆想個不停？
B：因為你的大腦以為，只要一直想，就能解決問題。
A：可是我好像越想越亂。
B：因為很多時候，你其實不是在找答案。"></textarea>
      <div class="hint">支援 A：/ B：或 A: / B: 格式，每行一句</div>
    </div>

    <div class="sec">
      <div class="sec-label">Timing</div>
      <div class="timing-row">
        <span class="timing-label">每字速度</span>
        <div class="timing-right">
          <input type="range" id="charSpeed" min="30" max="150" step="10" value="70"
            oninput="document.getElementById('charSpeedVal').textContent=this.value+'ms'">
          <span class="timing-val" id="charSpeedVal">70ms</span>
        </div>
      </div>
      <div class="timing-row">
        <span class="timing-label">顯示後停留</span>
        <div class="timing-right">
          <input type="range" id="holdTime" min="0.5" max="4" step="0.5" value="1.5"
            oninput="document.getElementById('holdTimeVal').textContent=this.value+'s'">
          <span class="timing-val" id="holdTimeVal">1.5s</span>
        </div>
      </div>
      <div class="timing-row">
        <span class="timing-label">消失速度</span>
        <div class="timing-right">
          <input type="range" id="fadeTime" min="0.1" max="0.8" step="0.1" value="0.3"
            oninput="document.getElementById('fadeTimeVal').textContent=this.value+'s'">
          <span class="timing-val" id="fadeTimeVal">0.3s</span>
        </div>
      </div>
    </div>

  </div>

  <div class="left-footer">
    <button class="gen-btn" onclick="generate()">Generate Preview</button>
    <button class="export-btn" id="exportBtn" onclick="exportVideo()" disabled>↓ Export Video (.webm)</button>
    <div class="status" id="statusMsg">上傳底圖並貼上對話後按 Generate</div>
  </div>
</div>

<!-- RIGHT -->
<div class="right">
  <div class="bg-chips" id="bgChips"></div>
  <canvas id="cv" width="1080" height="1920" style="width:360px;height:640px;"></canvas>
  <div class="playback">
    <button class="play-pause" id="playBtn" onclick="togglePlay()">
      <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <div class="track" id="track" onclick="seek(event)">
      <div class="track-fill" id="trackFill" style="width:0%"></div>
    </div>
    <span class="time" id="timeDisp">0:00 / 0:00</span>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// CONSTANTS — canvas IS 1080×1920 (native resolution)
// All coordinates are in source image pixels directly
const SCALE = 1; // canvas = source image size, no scaling needed
const TEXT_Y_TOP    = 800;
const TEXT_Y_BOTTOM = 911;
const TEXT_Y_CENTER = Math.round((TEXT_Y_TOP + TEXT_Y_BOTTOM) / 2); // 855

// A is left person, B is right person
// x positions as % of 1080px canvas
const A_X = Math.round(1080 * 0.27); // ~292
const B_X = Math.round(1080 * 0.73); // ~788
const TEXT_MAX_W = 402; // max text width per side (~one extra character)

// ══════════════════════════════════════════
// STATE
const MAX_BG = 4;
let bgs = [null,null,null,null];
let bgURLs = [null,null,null,null];
let activeBg = 0;

// Timeline events
// Each event: { t, type, side, text, fullText }
// type: 'type' | 'show' | 'fade-out'
// We render by scanning timeline up to currentTime
let timeline = []; // {startT, endT, side:'A'|'B', text:string, phase:'typing'|'hold'|'fading'|'gone'}
let totalDur = 0;
let currentTime = 0;
let isPlaying = false;
let lastTS = null;
let animId = null;

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

// ══════════════════════════════════════════
// BG MANAGEMENT
function initBgGrid() {
  const grid = document.getElementById('bgGrid');
  grid.innerHTML = '';
  for (let i=0;i<MAX_BG;i++) {
    const slot = document.createElement('div');
    slot.className = 'bg-slot';
    slot.dataset.idx = i;
    slot.innerHTML = `
      <input type="file" accept="image/*" onchange="loadBg(${i},event)">
      <div class="slot-num">${i+1}</div>
      <div class="bg-slot-label">Upload</div>
      <button class="remove-bg" onclick="removeBg(${i},event)">×</button>`;
    grid.appendChild(slot);
  }
}

function loadBg(i, e) {
  const file = e.target.files[0]; if(!file) return;
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    bgs[i]=img; bgURLs[i]=url;
    const slot = document.querySelector(`.bg-slot[data-idx="${i}"]`);
    let im = slot.querySelector('img');
    if(!im){im=document.createElement('img');slot.prepend(im);}
    im.src=url; slot.classList.add('filled');
    slot.querySelector('.bg-slot-label').textContent='BG'+(i+1);
    if(bgs[activeBg]==null) activeBg=i;
    updateChips(); drawStatic();
  };
  img.src=url;
}

function removeBg(i,e) {
  e.stopPropagation();
  bgs[i]=null; bgURLs[i]=null;
  const slot=document.querySelector(`.bg-slot[data-idx="${i}"]`);
  const im=slot.querySelector('img'); if(im)im.remove();
  slot.classList.remove('filled');
  slot.querySelector('.bg-slot-label').textContent='Upload';
  if(activeBg===i) activeBg=bgs.findIndex(b=>b!==null); if(activeBg<0)activeBg=0;
  updateChips(); drawStatic();
}

function updateChips() {
  const chips=document.getElementById('bgChips'); chips.innerHTML='';
  bgs.forEach((bg,i)=>{
    if(!bg)return;
    const c=document.createElement('div');
    c.className='bg-chip'+(i===activeBg?' active':'');
    c.onclick=()=>{activeBg=i;updateChips();drawStatic();};
    const im=document.createElement('img'); im.src=bgURLs[i]; c.appendChild(im);
    chips.appendChild(c);
  });
}

// ══════════════════════════════════════════
// PARSE DIALOGUE
function parseDialogue(raw) {
  const lines = raw.split('\n');
  const result = [];
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    // Match A: / B: / A： / B：
    const m = trimmed.match(/^([AB])[：:]\s*(.+)$/i);
    if (m) {
      result.push({ side: m[1].toUpperCase(), text: m[2].trim() });
    }
  }
  return result;
}

// ══════════════════════════════════════════
// BUILD TIMELINE
/*
  Logic per side:
  - When a new line for side X comes in:
    - If X currently has text showing → fade it out first
    - Then start typing new text
    - Hold after typing done
  - The other side's text stays until it gets a new line

  We track state per side: {text, phaseStart, phase}
*/
function buildTimeline() {
  const raw = document.getElementById('dialogueInput').value;
  const lines = parseDialogue(raw);
  if (!lines.length) return false;

  const charSpeedS = parseInt(document.getElementById('charSpeed').value) / 1000;
  const holdS      = parseFloat(document.getElementById('holdTime').value);
  const fadeS      = parseFloat(document.getElementById('fadeTime').value);

  // timeline segments: array of
  // { side, text, typingStart, typingEnd, holdEnd, fadeEnd }
  // We'll render each segment at render time by checking currentTime

  let t = 0;
  // Current active segment for each side
  let active = { A: null, B: null };
  let segments = [];

  for (let i = 0; i < lines.length; i++) {
    const { side, text } = lines[i];
    const other = side === 'A' ? 'B' : 'A';

    // If this side already has an active segment, we need to fade it out
    if (active[side] !== null) {
      const prev = active[side];
      // Fade starts at t, ends at t+fadeS
      prev.fadeStart = t;
      prev.fadeEnd   = t + fadeS;
      t = prev.fadeEnd;
    }

    // Type this new segment
    const typingDur = text.length * charSpeedS;
    const seg = {
      side,
      text,
      typingStart: t,
      typingEnd:   t + typingDur,
      holdEnd:     t + typingDur + holdS,
      fadeStart:   null, // set when next same-side line arrives or at very end
      fadeEnd:     null,
    };
    segments.push(seg);
    active[side] = seg;

    // Advance t to after typing + hold
    t = seg.holdEnd;
  }

  // Close remaining active segments
  for (const side of ['A','B']) {
    if (active[side] && active[side].fadeStart === null) {
      active[side].fadeStart = t;
      active[side].fadeEnd   = t + fadeS;
    }
  }
  totalDur = t + fadeS + 0.3;

  timeline = segments;
  return true;
}

// ══════════════════════════════════════════
// RENDER
function drawBg() {
  const bg = bgs[activeBg];
  if (bg) {
    const ca=cv.width/cv.height, ia=bg.width/bg.height;
    let sx=0,sy=0,sw=bg.width,sh=bg.height;
    if(ia>ca){sw=bg.height*ca;sx=(bg.width-sw)/2;}
    else{sh=bg.width/ca;sy=(bg.height-sh)/2;}
    ctx.drawImage(bg,sx,sy,sw,sh,0,0,cv.width,cv.height);
    ctx.fillStyle='rgba(0,0,0,0.22)';ctx.fillRect(0,0,cv.width,cv.height);
  } else {
    ctx.fillStyle='#161616';ctx.fillRect(0,0,cv.width,cv.height);
  }
}

function drawTitle() {
  const l1 = document.getElementById('titleLine1').value.trim();
  const l2 = document.getElementById('titleLine2').value.trim();
  if (!l1 && !l2) return;

  // Native 1080×1920 coords — title zone y400–600, center=500
  const TITLE_CENTER = 500;
  const fsize = 52; // ~3x dialogue font for prominence
  const lh = fsize + 18;
  const lineCount = (l1 ? 1 : 0) + (l2 ? 1 : 0);
  const totalH = lineCount * lh;
  let y = TITLE_CENTER - totalH / 2 + fsize;

  ctx.save();
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffffff';
  ctx.font = `700 ${fsize}px "PingFang TC","Microsoft JhengHei","Noto Sans TC","Helvetica Neue",sans-serif`;
  ctx.letterSpacing = '0.05em';
  if (l1) { ctx.fillText(l1, cv.width/2, y); y += lh; }
  if (l2) { ctx.fillText(l2, cv.width/2, y); }
  ctx.restore();
}

// Wrap text into lines fitting maxW, return array of strings
function wrapText(text, maxW, font) {
  ctx.font = font;
  const chars = [...text];
  const lines = [];
  let cur = '';
  for (const ch of chars) {
    const test = cur + ch;
    if (ctx.measureText(test).width > maxW && cur) {
      lines.push(cur); cur = ch;
    } else { cur = test; }
  }
  if (cur) lines.push(cur);
  return lines.length ? lines : [''];
}

function drawSideText(side, text, alpha, showCursor) {
  if (!text || alpha <= 0) return;
  const isA = side === 'A';
  const xCenter = isA ? A_X : B_X;
  const font = '400 42px "PingFang TC","Microsoft JhengHei","Helvetica Neue",sans-serif';
  const maxW = TEXT_MAX_W;
  const lh = 60;

  const lines = wrapText(text, maxW, font);
  const totalH = lines.length * lh;
  let yStart = TEXT_Y_CENTER - totalH / 2 + lh * 0.8;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#ffffff';
  ctx.font = font;
  ctx.letterSpacing = '0.02em';
  ctx.textAlign = 'center';

  lines.forEach((line, i) => {
    ctx.fillText(line, xCenter, yStart + i * lh);
  });

  // Cursor
  if (showCursor) {
    const lastLine = lines[lines.length-1];
    const lw = ctx.measureText(lastLine).width;
    const cx = xCenter + lw/2 + 6;
    const cy = yStart + (lines.length-1)*lh - 34;
    ctx.fillRect(cx, cy, 4, 40);
  }

  ctx.restore();
}

function renderAt(t) {
  ctx.clearRect(0,0,cv.width,cv.height);
  drawBg();
  drawTitle();

  // For each side, find the segment active at time t
  for (const side of ['A','B']) {
    // Find segment that covers t
    let seg = null;
    for (const s of timeline) {
      if (s.side !== side) continue;
      // Segment is visible from typingStart to fadeEnd
      const visStart = s.typingStart;
      const visEnd   = s.fadeEnd !== null ? s.fadeEnd : totalDur;
      if (t >= visStart && t <= visEnd) { seg = s; }
    }
    if (!seg) continue;

    // Determine how much text to show and alpha
    let displayText = '';
    let alpha = 1;
    let showCursor = false;

    if (t < seg.typingEnd) {
      // Typing phase
      const charSpeedS = parseInt(document.getElementById('charSpeed').value)/1000;
      const charsTyped = Math.floor((t - seg.typingStart) / charSpeedS);
      displayText = seg.text.substring(0, charsTyped);
      alpha = 1;
      showCursor = true;
    } else if (seg.fadeStart === null || t < seg.fadeStart) {
      // Hold phase
      displayText = seg.text;
      alpha = 1;
      showCursor = false;
    } else if (t < seg.fadeEnd) {
      // Fading out
      displayText = seg.text;
      const fadeS = parseFloat(document.getElementById('fadeTime').value);
      alpha = 1 - (t - seg.fadeStart) / fadeS;
      alpha = Math.max(0, Math.min(1, alpha));
      showCursor = false;
    } else {
      // Gone
      continue;
    }

    drawSideText(side, displayText, alpha, showCursor);
  }
}

function drawStatic() {
  ctx.clearRect(0,0,cv.width,cv.height);
  drawBg();
  drawTitle();
  if (!bgs[activeBg]) {
    ctx.fillStyle='#252525';ctx.font='11px Helvetica';
    ctx.textAlign='center';ctx.letterSpacing='0';
    ctx.fillText('Upload background image', cv.width/2, cv.height/2);
  }
}

// ══════════════════════════════════════════
// GENERATE
function generate() {
  if (!buildTimeline()) {
    setStatus('請貼上對話文字（格式：A：... / B：...）');
    return;
  }
  // Stop any existing playback
  isPlaying = false;
  cancelAnimationFrame(animId);

  currentTime = 0;
  updatePlayBtn();
  renderAt(0);
  updatePlayUI();
  document.getElementById('exportBtn').disabled = false;
  setStatus(`✓ ${timeline.length} lines · ${totalDur.toFixed(1)}s — 按 ▶ 預覽`);

  // Auto-start playback
  isPlaying = true;
  lastTS = null;
  updatePlayBtn();
  animId = requestAnimationFrame(tick);
}

// ══════════════════════════════════════════
// PLAYBACK
function togglePlay() {
  if (!timeline.length) return;
  isPlaying = !isPlaying;
  if (isPlaying) {
    if (currentTime >= totalDur) currentTime = 0;
    lastTS = null;
    animId = requestAnimationFrame(tick);
  } else { cancelAnimationFrame(animId); }
  updatePlayBtn();
}

function tick(ts) {
  if (!isPlaying) return;
  if (lastTS===null) lastTS=ts;
  currentTime += (ts-lastTS)/1000; lastTS=ts;
  if (currentTime >= totalDur) {
    currentTime=totalDur; isPlaying=false;
    updatePlayBtn(); renderAt(currentTime); updatePlayUI(); return;
  }
  renderAt(currentTime); updatePlayUI();
  animId = requestAnimationFrame(tick);
}

function seek(e) {
  if (!timeline.length) return;
  const r=e.currentTarget.getBoundingClientRect();
  currentTime=((e.clientX-r.left)/r.width)*totalDur;
  renderAt(currentTime); updatePlayUI();
}

function updatePlayBtn() {
  document.getElementById('playIcon').innerHTML = isPlaying
    ? '<path d="M6 19h4V5H6zm8-14v14h4V5z"/>'
    : '<path d="M8 5v14l11-7z"/>';
}

function updatePlayUI() {
  const pct = totalDur>0?(currentTime/totalDur)*100:0;
  document.getElementById('trackFill').style.width=pct+'%';
  document.getElementById('timeDisp').textContent=fmt(currentTime)+' / '+fmt(totalDur);
}

function fmt(s) {
  const m=Math.floor(s/60);
  return m+':'+String(Math.floor(s%60)).padStart(2,'0');
}

// ══════════════════════════════════════════
// EXPORT — background offscreen canvas, driven by real wall clock
function exportVideo() {
  if (!timeline.length) return;

  // Freeze preview — don't touch it during export
  isPlaying = false;
  cancelAnimationFrame(animId);
  updatePlayBtn();

  setStatus('⏺ Exporting… 請稍候');
  document.getElementById('exportBtn').disabled = true;
  document.getElementById('exportBtn').textContent = '⏺ Exporting…';

  const FPS     = 30;
  const BITRATE = 2500000;

  // Offscreen canvas — export renders here, preview canvas untouched
  const oc   = document.createElement('canvas');
  oc.width   = cv.width;
  oc.height  = cv.height;
  const octx = oc.getContext('2d');

  // Read timing settings once
  const charSpeedS = parseInt(document.getElementById('charSpeed').value) / 1000;
  const fadeS      = parseFloat(document.getElementById('fadeTime').value);
  const l1         = document.getElementById('titleLine1').value.trim();
  const l2         = document.getElementById('titleLine2').value.trim();

  function renderFrame(t) {
    octx.clearRect(0, 0, oc.width, oc.height);

    // BG
    const bg = bgs[activeBg];
    if (bg) {
      const ca=oc.width/oc.height, ia=bg.width/bg.height;
      let sx=0,sy=0,sw=bg.width,sh=bg.height;
      if(ia>ca){sw=bg.height*ca;sx=(bg.width-sw)/2;}
      else{sh=bg.width/ca;sy=(bg.height-sh)/2;}
      octx.drawImage(bg,sx,sy,sw,sh,0,0,oc.width,oc.height);
      octx.fillStyle='rgba(0,0,0,0.22)';
      octx.fillRect(0,0,oc.width,oc.height);
    } else {
      octx.fillStyle='#161616';
      octx.fillRect(0,0,oc.width,oc.height);
    }

    // Title
    if (l1||l2) {
      const fsize=52, lh=fsize+18;
      const lineCount=(l1?1:0)+(l2?1:0);
      let y=500-(lineCount*lh)/2+fsize;
      octx.save();
      octx.textAlign='center';
      octx.fillStyle='#ffffff';
      octx.font=`700 ${fsize}px "PingFang TC","Microsoft JhengHei","Noto Sans TC","Helvetica Neue",sans-serif`;
      octx.letterSpacing='0.05em';
      if(l1){octx.fillText(l1,oc.width/2,y);y+=lh;}
      if(l2) octx.fillText(l2,oc.width/2,y);
      octx.restore();
    }

    // Dialogue
    for (const side of ['A','B']) {
      let seg=null;
      for (const s of timeline) {
        if(s.side!==side) continue;
        const visEnd=s.fadeEnd!==null?s.fadeEnd:totalDur;
        if(t>=s.typingStart&&t<=visEnd) seg=s;
      }
      if(!seg) continue;

      let displayText='', alpha=1, showCursor=false;
      if(t<seg.typingEnd){
        const n=Math.floor((t-seg.typingStart)/charSpeedS);
        displayText=seg.text.substring(0,n);
        showCursor=true;
      } else if(seg.fadeStart===null||t<seg.fadeStart){
        displayText=seg.text;
      } else if(t<seg.fadeEnd){
        displayText=seg.text;
        alpha=Math.max(0,1-(t-seg.fadeStart)/fadeS);
      } else continue;
      if(!displayText) continue;

      const xCenter=side==='A'?A_X:B_X;
      const font='400 42px "PingFang TC","Microsoft JhengHei","Helvetica Neue",sans-serif';
      const lh=60;
      octx.font=font;
      const wlines=[];
      let cur='';
      for(const ch of [...displayText]){
        const test=cur+ch;
        if(octx.measureText(test).width>TEXT_MAX_W&&cur){wlines.push(cur);cur=ch;}
        else cur=test;
      }
      if(cur)wlines.push(cur);
      if(!wlines.length)wlines.push('');
      const yStart=TEXT_Y_CENTER-(wlines.length*lh)/2+lh*0.8;
      octx.save();
      octx.globalAlpha=alpha;
      octx.fillStyle='#ffffff';
      octx.font=font;
      octx.letterSpacing='0.02em';
      octx.textAlign='center';
      wlines.forEach((line,i)=>octx.fillText(line,xCenter,yStart+i*lh));
      if(showCursor){
        const lw=octx.measureText(wlines[wlines.length-1]).width;
        octx.fillRect(xCenter+lw/2+6,yStart+(wlines.length-1)*lh-34,4,40);
      }
      octx.restore();
    }
  }

  // Set up MediaRecorder
  const stream=oc.captureStream(FPS);
  let mr;
  try{mr=new MediaRecorder(stream,{mimeType:'video/webm;codecs=vp9',videoBitsPerSecond:BITRATE});}
  catch{try{mr=new MediaRecorder(stream,{videoBitsPerSecond:BITRATE});}catch{mr=new MediaRecorder(stream);}}

  const chunks=[];
  mr.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
  mr.onstop=()=>{
    const blob=new Blob(chunks,{type:'video/webm'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='hms_dialogue_'+Date.now()+'.webm';
    a.click();
    setStatus('✓ 匯出完成');
    document.getElementById('exportBtn').disabled=false;
    document.getElementById('exportBtn').textContent='↓ Export Video (.webm)';
  };

  mr.start();

  // Drive frames by REAL wall clock — guarantees export speed = preview speed
  const startWall = performance.now();
  const totalMs   = (totalDur + 0.8) * 1000;

  function tick() {
    const elapsed = performance.now() - startWall;
    if (elapsed >= totalMs) {
      renderFrame(totalDur);
      mr.stop();
      return;
    }
    renderFrame(elapsed / 1000);
    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
}

function setStatus(msg){document.getElementById('statusMsg').textContent=msg;}

// ══════════════════════════════════════════
// INIT
initBgGrid();
drawStatic();
['titleLine1','titleLine2'].forEach(id=>{
  document.getElementById(id).addEventListener('input',drawStatic);
});
</script>
